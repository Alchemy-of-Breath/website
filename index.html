<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alchemy of Breath</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#FBF7EF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Marcellus&family=Roboto:wght@300;400;500&display=swap">
<style>
:root{
  --paper:#FFFFFF;--paper-2:#FBF7EF;--cream:#FDF6E9;
  --gold:#E1B668;--gold-deep:#D6A652;--slate:#5B7889;--ink:#221F20;
  --grad-gold:linear-gradient(135deg,#E1B668 0%,#D6A652 100%);
  --serif:'Marcellus',Georgia,serif;--sans:'Roboto',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--sans);font-weight:300;color:var(--ink);
  background:radial-gradient(120% 90% at 50% 0%,var(--cream) 0%,var(--paper) 62%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;
}
.card{max-width:560px;text-align:center}
.card img{height:44px;width:auto;margin:0 auto 34px;display:block}
h1{font-family:var(--serif);font-weight:400;font-size:2.2rem;line-height:1.2;margin-bottom:14px}
.tag{font-size:.74rem;font-weight:500;letter-spacing:.26em;text-transform:uppercase;color:var(--slate);margin-bottom:34px}
.pages{list-style:none;text-align:left;border-top:1px solid rgba(225,182,104,.35)}
.pages li{border-bottom:1px solid rgba(225,182,104,.35)}
.pages a{
  display:flex;justify-content:space-between;align-items:center;gap:16px;
  padding:18px 8px;text-decoration:none;color:var(--ink);font-size:1.02rem;transition:background .25s,padding-left .25s;
}
.pages a:hover{background:rgba(253,246,233,.6);padding-left:16px}
.pages .arr{color:var(--gold-deep)}
.note{font-size:.8rem;color:var(--slate);margin-top:30px}
</style>
</head>
<body>
<main class="card">
  <img src="https://alchemyofbreath.com/wp-content/uploads/AOB-Gold-Black-Transparant.png" alt="Alchemy of Breath">
  <h1>Alchemy of Breath — Website 2026</h1>
  <p class="tag">Development index · not a public page</p>
  <ul class="pages">
    <li><a href="facilitator-training/">Facilitator Training <span class="arr">&rarr;</span></a></li>
    <li><a href="live-residential-breathwork-facilitator-training/">Live Residential Facilitator Training <span class="arr">&rarr;</span></a></li>
  </ul>
  <p class="note">New pages will be listed here as they are added to the project.</p>
</main>
</body>
</html>
